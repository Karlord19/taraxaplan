<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taraxaplan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Sidebar -->
    <div id="sidebar">
        <button id="toggle-sidebar">☰</button>
        <div class="sidebar-content">
            <h2>Taraxaplan</h2>
            <ul>
                <li><a href="#" class="nav-link active" data-target="workspace-graph">Dependency Graph</a></li>
                <li><a href="#" class="nav-link" data-target="workspace-items">Items</a></li>
                <li><a href="#" class="nav-link" data-target="workspace-people">People (Organizers)</a></li>
            </ul>
            <hr class="divider">
            <button id="btn-save" class="action-btn">💾 Save Data</button>
            <input type="file" id="file-load" accept=".json" class="hidden">
            <button id="btn-load" class="action-btn" onclick="document.getElementById('file-load').click()">📂 Load Data</button>
        </div>
    </div>

    <!-- Graph Workspace -->
    <div id="workspace-graph" class="workspace active">
        <div id="graph-controls">
            <button id="btn-zoom-in">+</button>
            <button id="btn-zoom-out">-</button>
            <button id="btn-center-fit">⛶ Center & Fit</button>
        </div>
        <!-- Transform Layer handles Pan and Zoom -->
        <div id="graph-transform-layer">
            <svg id="connections-canvas"></svg>
            <div id="nodes-container"></div>
        </div>
    </div>

    <!-- Items Workspace -->
    <div id="workspace-items" class="workspace hidden">
        <div class="page-header">
            <h2>Items & Knowledge</h2>
            <button id="btn-add-item" class="add-btn">+ Add Item</button>
        </div>
        <div id="items-list" class="entity-list"></div>
    </div>

    <!-- People Workspace -->
    <div id="workspace-people" class="workspace hidden">
        <div class="page-header">
            <h2>People (Organizers)</h2>
            <button id="btn-add-person" class="add-btn">+ Add Person</button>
        </div>
        <div id="people-list" class="entity-list"></div>
    </div>

    <!-- Edit Node Modal -->
    <div id="edit-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Edit Action</h3>
            <label>Owner: <select id="edit-owner"></select></label>
            <label>Short Description: <input type="text" id="edit-short"></label>
            <label>Long Description: <textarea id="edit-long"></textarea></label>
            <label>Prerequisites (Inputs): <div id="edit-prereqs-list" class="checkbox-list"></div></label>
            <label>Outputs: <div id="edit-outputs-list" class="checkbox-list"></div></label>
            <div class="modal-actions">
                <button id="save-node-btn" class="primary-btn">Save</button>
                <button id="cancel-node-btn" class="action-btn" style="margin-left:10px;">Cancel</button>
                <div class="spacer"></div>
                <button id="delete-node" class="danger-btn">Delete</button>
            </div>
            <small style="color:#aaa; align-self:center; margin-top:10px;">(Or click background to save)</small>
        </div>
    </div>

    <!-- Edit Entity (Item/Person) Modal -->
    <div id="edit-entity-modal" class="modal hidden">
        <div class="modal-content">
            <h3 id="entity-modal-title">Edit Entity</h3>
            <label>Name: <input type="text" id="edit-entity-name"></label>
            <label id="color-picker-label" class="hidden">Color: <input type="color" id="edit-entity-color" value="#444444"></label>
            <label>Long Description: <textarea id="edit-entity-desc"></textarea></label>
            <div class="modal-actions">
                <button id="save-entity-btn" class="primary-btn">Save</button>
                <button id="cancel-entity-btn" class="action-btn" style="margin-left:10px;">Cancel</button>
                <div class="spacer"></div>
                <button id="delete-entity" class="danger-btn">Delete</button>
            </div>
            <small style="color:#aaa; align-self:center; margin-top:10px;">(Or click background to save)</small>
        </div>
    </div>

    <!-- Scripts must load in this order -->
    <script src="data.js"></script>
    <script src="graph.js"></script>
    <script src="ui.js"></script>
</body>
</html>
